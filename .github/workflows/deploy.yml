name: Deploy to VPS

on:
  workflow_run:
    workflows: ['Build']
    types: [completed]
    branches: ['prod']
  workflow_dispatch:

jobs:
  deploy:
    # Só executa se o build anterior teve sucesso (workflow_run) ou se foi disparado manualmente
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: [self-hosted, Linux, X64]
    # O environment "production" deve ter "Required reviewers" configurado nas
    # Settings > Environments do repositório para exigir aprovação antes do deploy.
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          timeout: 600s
          script: |
            set -e
            cd /opt/nexus-os

            echo "IMAGE_TAG from .env: $(grep IMAGE_TAG .env || echo 'not found')"

            echo "🛑 Stopping containers..."
            docker compose down --remove-orphans || true

            echo "🚀 Starting services..."
            docker compose --env-file .env up -d --no-build --remove-orphans

            echo "⏳ Waiting for app to be ready..."
            timeout 60 sh -c 'until docker compose ps app | grep -q "healthy\|running"; do sleep 2; done' || true

            echo "📊 Status:"
            docker compose ps
            docker compose logs --tail=20 app
