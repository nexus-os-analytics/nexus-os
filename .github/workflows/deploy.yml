name: CI/CD

on:
  push:
    branches: ['prod']
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set image tag
        id: meta
        run: echo "tag=$(echo $GITHUB_SHA | cut -c1-8)" >> $GITHUB_OUTPUT

      - name: Create .env
        run: |
          cat > .env << 'EOF'
          ${{ secrets.PROD_ENV_FILE }}
          EOF
          sed -i 's/\r$//' .env || true
          echo "IMAGE_TAG=${{ steps.meta.outputs.tag }}" >> .env
          echo "✅ .env criado:"
          wc -l .env || true
          head -n 5 .env || true

      - name: Prepare files for upload
        run: |
          git clean -fdx -e .env
          echo "📦 Upload size: $(du -sh . | cut -f1)"

      - name: Upload project to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: './'
          target: '/opt/nexus-os'
          rm: true
          strip_components: 0
          overwrite: true
          use_insecure_cipher: true
          timeout: 120s
          command_timeout: 300s

      - name: Build Docker images on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          timeout: 600s
          script: |
            set -e
            cd /opt/nexus-os

            echo "IMAGE_TAG from .env: $(grep IMAGE_TAG .env || echo 'not found')"

            echo "🔨 Building images with cache..."
            DOCKER_BUILDKIT=1 docker compose --env-file .env build --parallel

            echo "🏷️  Tagging latest for cache..."
            docker tag nexus-os:$(grep IMAGE_TAG .env | cut -d= -f2) nexus-os:latest || true
            docker tag nexus-os-migrate:$(grep IMAGE_TAG .env | cut -d= -f2) nexus-os-migrate:latest || true

            echo "✅ Build concluído."

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # O environment "production" deve ter "Required reviewers" configurado nas
    # Settings > Environments do repositório para exigir aprovação antes do deploy.
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          timeout: 600s
          script: |
            set -e
            cd /opt/nexus-os

            echo "IMAGE_TAG from .env: $(grep IMAGE_TAG .env || echo 'not found')"

            echo "🛑 Stopping containers..."
            docker compose down --remove-orphans || true

            echo "🚀 Starting services..."
            docker compose --env-file .env up -d --no-build --remove-orphans

            echo "⏳ Waiting for app to be ready..."
            timeout 60 sh -c 'until docker compose ps app | grep -q "healthy\|running"; do sleep 2; done' || true

            echo "📊 Status:"
            docker compose ps
            docker compose logs --tail=20 app
